<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHLMS | Hardware Compliance Portal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-cyan: #00E5FF;
            --primary-green: #10B981;
            --danger-red: #EF4444;
            --bg-dark: #0B0F15;
            --card-surface: #141B23;
            --input-field: #1D2630;
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 0% 0%, #16202c 0%, var(--bg-dark) 70%);
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        * { box-sizing: border-box; }

        .container { 
            background: var(--card-surface);
            padding: 40px; 
            border-radius: 4px; 
            border-left: 4px solid var(--primary-cyan);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 440px; 
        }

        .header-context { 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            margin-bottom: 8px; 
        }

        h2.portal-title { 
            font-size: 1.5rem; 
            margin: 0 0 35px 0; 
            letter-spacing: 1px; 
            font-weight: 300;
            color: var(--text-main);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }

        .form-group { margin-bottom: 25px; text-align: left; }

        label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        input, select { 
            width: 100%; 
            padding: 15px; 
            border-radius: 2px; 
            border: 1px solid #2D3748; 
            background: var(--input-field); 
            color: var(--text-main); 
            font-size: 1rem; 
            transition: all 0.2s ease;
        }

        input:focus, select:focus { 
            border-color: var(--primary-cyan); 
            outline: none; 
            background: #242E3A;
        }

        /* Angled "Parallelogram" Button Style */
        .action-button { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            margin-top: 10px;
        }

        .btn-primary { 
            background-color: var(--primary-cyan); 
            color: #000; 
        }

        .btn-success { 
            background-color: var(--primary-green); 
            color: #000; 
        }

        .btn-danger { 
            background-color: var(--danger-red); 
            color: #FFF; 
        }

        .action-button:hover { 
            filter: brightness(1.2); 
            transform: translateY(-2px);
        }

        .action-button:active { transform: translateY(0); }

        #reader { 
            width: 100%; 
            border-radius: 2px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            background: #000; 
            border: 1px solid #2D3748;
            min-height: 200px;
        }

        #statusMessage { 
            margin-top: 30px; 
            font-size: 0.8rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 20px; 
            text-align: center;
        }

        .status-success { color: var(--primary-green); }
        .status-error { color: var(--danger-red); }
        .status-neutral { color: var(--primary-cyan); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-context">System Environment: Production</div>
        <h2 class="portal-title">AHLMS Tech Portal</h2>

        <div class="form-group">
            <label for="cameraSelect">Hardware Interface</label>
            <select id="cameraSelect">
                <option value="">Detecting active lenses...</option>
            </select>
        </div>

        <div id="reader"></div>
        
        <button id="startScan" onclick="startScanner()" class="action-button btn-primary">
            Initialize Scanner
        </button>

        <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px;">
            <div class="form-group">
                <label for="serial">Asset Serial Identifier</label>
                <input type="text" id="serial" placeholder="Await scan input...">
            </div>

            <div class="form-group">
                <label for="deviceType">Asset Classification</label>
                <select id="deviceType">
                    <option value="HP EliteBook">HP EliteBook (Laptop)</option>
                    <option value="Dell Latitude">Dell Latitude (Laptop)</option>
                    <option value="Cisco Router">Cisco Catalyst (Network)</option>
                </select>
            </div>

            <button id="submitBtn" onclick="submitScan()" class="action-button btn-success">
                Execute Cloud Log
            </button>
        </div>

        <div id="statusMessage"></div>
    </div>

    <script>
        let html5QrCode;

        async function getCameras() {
            const cameraSelect = document.getElementById('cameraSelect');
            try {
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    cameraSelect.innerHTML = "";
                    devices.forEach((device, index) => {
                        const option = document.createElement("option");
                        option.value = device.id;
                        option.text = device.label || `LENS_INTERFACE_0${index + 1}`;
                        cameraSelect.appendChild(option);
                    });
                } else {
                    cameraSelect.innerHTML = "<option>Error: No lenses found</option>";
                }
            } catch (err) {
                cameraSelect.innerHTML = "<option>Error: Permission restricted</option>";
            }
        }

        window.onload = getCameras;

       async function startScanner() {
    const statusDiv = document.getElementById('statusMessage');
    const startButton = document.getElementById('startScan');
    const cameraId = document.getElementById('cameraSelect').value;
    
    if(!cameraId) {
        statusDiv.innerHTML = "<span class='status-error'>SELECT LENS INTERFACE</span>";
        return;
    }

    startButton.disabled = true;
    statusDiv.innerHTML = "<span class='status-neutral'>SYNCING OPTICAL SENSORS...</span>";

    if(html5QrCode) { try { await html5QrCode.clear(); } catch(e) {} }
    html5QrCode = new Html5Qrcode("reader");
    
    // UPGRADED CONFIGURATION
    const config = { 
        fps: 30, // Higher frame rate for faster detection
        qrbox: { width: 300, height: 150 }, // Adjusted for 1D barcodes
        aspectRatio: 1.777778,
        // This is the CRITICAL part: enabling all common hardware formats
        formatsToSupport: [ 
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.QR_CODE 
        ]
    };

    try {
        await html5QrCode.start(
            cameraId, 
            config,
            (decodedText) => {
                // Play a subtle vibration or sound could go here if native
                document.getElementById('serial').value = decodedText;
                statusDiv.innerHTML = "<span class='status-success'>IDENTIFIER VERIFIED: " + decodedText + "</span>";
                stopScanner();
            },
            (errorMessage) => {
                // Silently ignore failed frame scans to keep the UI clean
            }
        );
        
        startButton.innerHTML = "TERMINATE SCAN";
        startButton.className = "action-button btn-danger";
        startButton.onclick = stopScanner;
        startButton.disabled = false;
    } catch (err) {
        statusDiv.innerHTML = "<span class='status-error'>SENSORS OFFLINE: RECHECK PERMISSIONS</span>";
        startButton.disabled = false;
    }
}
        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    const startButton = document.getElementById('startScan');
                    startButton.innerHTML = "Initialize Scanner";
                    startButton.className = "action-button btn-primary";
                    startButton.onclick = startScanner;
                });
            }
        }

        async function submitScan() {
            const serial = document.getElementById('serial').value;
            const deviceType = document.getElementById('deviceType').value;
            const statusDiv = document.getElementById('statusMessage');

            if(!serial) {
                statusDiv.innerHTML = "<span class='status-error'>ERROR: SERIAL ID REQUIRED</span>";
                return;
            }

            statusDiv.innerHTML = "<span class='status-neutral'>INITIATING CLOUD HANDSHAKE...</span>";
            const apiUrl = "https://ii97ncprab.execute-api.us-east-1.amazonaws.com/scan";

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ SerialNumber: serial, DeviceType: deviceType })
                });

                if(response.ok) {
                    statusDiv.innerHTML = "<span class='status-success'>TRANSMISSION COMPLETE: AWS & SERVICENOW UPDATED</span>";
                    document.getElementById('serial').value = '';
                } else {
                    statusDiv.innerHTML = "<span class='status-error'>CLOUD ERROR: PACKET REJECTED</span>";
                }
            } catch (error) {
                statusDiv.innerHTML = "<span class='status-error'>NETWORK ERROR: ENDPOINT UNREACHABLE</span>";
            }
        }
    </script>
</body>
</html>
