<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHLMS | Hardware Compliance Portal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-cyan: #00E5FF;
            --primary-green: #10B981;
            --danger-red: #EF4444;
            --bg-dark: #0B0F15;
            --card-surface: #141B23;
            --input-field: #1D2630;
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 0% 0%, #16202c 0%, var(--bg-dark) 70%);
            color: var(--text-main); display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
        }

        * { box-sizing: border-box; }

        .container { 
            background: var(--card-surface); padding: 40px; border-radius: 4px; 
            border-left: 4px solid var(--primary-cyan);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; max-width: 440px; 
        }

        .header-context { color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; font-weight: 800; margin-bottom: 8px; }
        h2.portal-title { font-size: 1.5rem; margin: 0 0 35px 0; letter-spacing: 1px; font-weight: 300; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }

        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 10px; font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        input, select { width: 100%; padding: 15px; border-radius: 2px; border: 1px solid #2D3748; background: var(--input-field); color: var(--text-main); font-size: 1rem; }
        input:focus { border-color: var(--primary-cyan); outline: none; }

        .action-button { 
            width: 100%; padding: 18px; border: none; font-weight: 800; cursor: pointer; 
            transition: all 0.3s ease; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); margin-top: 10px;
        }

        .btn-primary { background-color: var(--primary-cyan); color: #000; }
        .btn-success { background-color: var(--primary-green); color: #000; }
        .btn-danger { background-color: var(--danger-red); color: #FFF; }
        .btn-neutral { background-color: #4A5568; color: #FFF; }

        /* Fixed height for the scanner to prevent page twitching */
        #reader { 
            width: 100%; 
            height: 250px; 
            border-radius: 2px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            background: #000; 
            border: 1px solid #2D3748; 
        }

        #statusMessage { 
            margin-top: 30px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 4px;
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; min-height: 50px; 
            display: flex; align-items: center; justify-content: center; text-align: center;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        
        .status-success { color: var(--primary-green); border-color: var(--primary-green) !important; font-weight: bold; }
        .status-error { color: var(--danger-red); border-color: var(--danger-red) !important; }
        .status-neutral { color: var(--primary-cyan); border-color: var(--primary-cyan) !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-context">System Environment: Production</div>
        <h2 class="portal-title">AHLMS Tech Portal</h2>

        <div class="form-group">
            <label for="cameraSelect">Interface Selection (Auto-Sync)</label>
            <select id="cameraSelect" onchange="autoSwitchCamera()">
                <option value="">Detecting active lenses...</option>
            </select>
        </div>

        <div id="reader"></div>
        
        <button id="startScan" onclick="startScanner()" class="action-button btn-primary">Initialize Scanner</button>
        <button id="aiAnalyze" onclick="analyzeWithAI()" class="action-button btn-neutral">Analyze with AI</button>

        <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px;">
            <div class="form-group">
                <label for="serial">Asset Serial Identifier</label>
                <input type="text" id="serial" placeholder="Await scan input...">
            </div>
            <div class="form-group">
                <label for="deviceType">Asset Classification</label>
                <select id="deviceType">
                    <option value="HP EliteBook">HP EliteBook (Laptop)</option>
                    <option value="Dell Latitude">Dell Latitude (Laptop)</option>
                    <option value="Cisco Router">Cisco Catalyst (Network)</option>
                </select>
            </div>
            <button id="submitBtn" onclick="submitScan()" class="action-button btn-success">Execute Cloud Log</button>
        </div>
        <div id="statusMessage">SYSTEM READY</div>
    </div>

    <script>
        let html5QrCode;
        const apiUrl = "https://ii97ncprab.execute-api.us-east-1.amazonaws.com/scan";

        async function getCameras() {
            const cameraSelect = document.getElementById('cameraSelect');
            try {
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    cameraSelect.innerHTML = "";
                    devices.forEach((device, index) => {
                        const option = document.createElement("option");
                        option.value = device.id;
                        option.text = device.label || `LENS_INTERFACE_0${index + 1}`;
                        cameraSelect.appendChild(option);
                    });
                    startScanner(); 
                }
            } catch (err) { cameraSelect.innerHTML = "<option>Error: Permission restricted</option>"; }
        }

        window.onload = getCameras;

        async function autoSwitchCamera() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            startScanner();
        }

        async function startScanner() {
            const statusDiv = document.getElementById('statusMessage');
            const startButton = document.getElementById('startScan');
            const cameraId = document.getElementById('cameraSelect').value;
            if(!cameraId) return;
            
            startButton.disabled = true;
            statusDiv.className = "status-neutral";
            statusDiv.innerHTML = "LENS ACTIVE: AWAITING IDENTIFIER";

            if(html5QrCode) { try { await html5QrCode.clear(); } catch(e) {} }
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(cameraId, { 
                    fps: 25, 
                    qrbox: { width: 300, height: 150 },
                    formatsToSupport: [ 
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.QR_CODE 
                    ]
                }, (text) => {
                    document.getElementById('serial').value = text;
                    statusDiv.className = "status-success";
                    statusDiv.innerHTML = "HARDWARE DETECTED:<br>" + text;
                });

                startButton.innerHTML = "Clear Data & Reset";
                startButton.className = "action-button btn-neutral";
                startButton.onclick = stopAndClear; 
                startButton.disabled = false;
            } catch (err) { 
                statusDiv.className = "status-error";
                statusDiv.innerHTML = "INTERFACE FAILED"; 
                startButton.disabled = false; 
            }
        }

        function stopAndClear() {
            const statusDiv = document.getElementById('statusMessage');
            const serialInput = document.getElementById('serial');
            const startButton = document.getElementById('startScan');

            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    startButton.innerHTML = "Initialize Scanner";
                    startButton.className = "action-button btn-primary";
                    startButton.onclick = startScanner;

                    // ERASE DATA
                    serialInput.value = ""; 
                    statusDiv.className = "status-neutral";
                    statusDiv.innerHTML = "INTERFACE RESET: DATA ERASED";
                }).catch(err => { console.log(err); });
            }
        }

        async function analyzeWithAI() {
            const statusDiv = document.getElementById('statusMessage');
            const video = document.querySelector('#reader video');
            if (!video) return;

            statusDiv.className = "status-neutral";
            statusDiv.innerHTML = "AI NEURAL PROCESSING...";

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const imageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();
                if (data.detectedValue && data.detectedValue !== "NOT_DETECTED") {
                    document.getElementById('serial').value = data.detectedValue;
                    statusDiv.className = "status-success";
                    statusDiv.innerHTML = "AI ANALYSIS SUCCESS:<br>" + data.detectedValue;
                } else {
                    statusDiv.className = "status-error";
                    statusDiv.innerHTML = "AI ERROR: DATA UNREADABLE";
                }
            } catch (err) {
                statusDiv.className = "status-error";
                statusDiv.innerHTML = "AI PIPELINE OFFLINE";
            }
        }

        async function submitScan() {
            const serial = document.getElementById('serial').value;
            const deviceType = document.getElementById('deviceType').value;
            const statusDiv = document.getElementById('statusMessage');
            if(!serial) { 
                statusDiv.className = "status-error";
                statusDiv.innerHTML = "SUBMISSION REJECTED: NO SERIAL"; 
                return; 
            }

            statusDiv.className = "status-neutral";
            statusDiv.innerHTML = "TRANSMITTING DATA TO CLOUD...";

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ SerialNumber: serial, DeviceType: deviceType })
                });
                if(response.ok) {
                    document.getElementById('serial').value = '';
                    statusDiv.className = "status-success";
                    statusDiv.innerHTML = "LOGGED TO AWS & SERVICENOW<br>READY FOR NEXT SCAN";
                } else { 
                    statusDiv.className = "status-error";
                    statusDiv.innerHTML = "CLOUD REJECTION"; 
                }
            } catch (error) { 
                statusDiv.className = "status-error";
                statusDiv.innerHTML = "ENDPOINT TIMEOUT"; 
            }
        }
    </script>
</body>
</html>
