<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHLMS Tech Scanner</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; display: flex; justify-content: center; margin-top: 50px;}
        .card { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid #333; }
        h2 { text-align: center; color: #4CAF50; margin-top: 0; }
        label { display: block; margin-top: 15px; font-size: 0.9em; color: #aaa; text-transform: uppercase; letter-spacing: 1px;}
        input, select { width: 100%; padding: 12px; margin-top: 8px; background-color: #2d2d2d; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        input:focus, select:focus { outline: none; border-color: #4CAF50; }
        button { width: 100%; padding: 15px; margin-top: 25px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #45a049; }
        .status { margin-top: 20px; text-align: center; font-size: 1em; font-weight: bold; min-height: 24px;}
    </style>
</head>
<body>
    <div class="card">
        <h2>AHLMS Tech Portal</h2>

        <div id="reader" style="width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px;"></div>
<button id="startScan" style="background-color: #2196F3; margin-bottom: 10px;">Open Camera Scanner</button>

        <label for="serial">Hardware Serial Number</label>
        <input type="text" id="serial" placeholder="Scan or type barcode..." required>

        <label for="deviceType">Device Type</label>
        <select id="deviceType">
            <option value="HP EliteBook">HP EliteBook</option>
            <option value="Dell Latitude">Dell Latitude</option>
            <option value="Cisco Catalyst Switch">Cisco Catalyst Switch</option>
        </select>

        <label for="protocol">Sanitization Protocol</label>
        <input type="text" id="protocol" value="DoD 5220.22-M" readonly>

        <button onclick="submitScan()">Submit to Cloud</button>

        <div id="statusMessage" class="status"></div>
    </div>

    <script>let html5QrCode;

async function startScanner() {
    const statusDiv = document.getElementById('statusMessage');
    const startButton = document.getElementById('startScan');
    
    // Disable button during initialization
    startButton.disabled = true;
    statusDiv.innerHTML = "Initializing camera...";

    html5QrCode = new Html5Qrcode("reader");
    
    // Upgraded High-Precision Config
const config = { 
    fps: 25, // Higher frames per second for faster "Auto-detection"
    qrbox: { width: 280, height: 120 }, // Narrower box to target specific barcodes
    aspectRatio: 1.777778,
    videoConstraints: {
        focusMode: "continuous", // Tells the phone to keep trying to focus
        width: { min: 640, ideal: 1280, max: 1920 }, // Forces HD resolution
        height: { min: 480, ideal: 720, max: 1080 }
    }
};

    try {
        // Start the camera (preferring the back camera)
        await html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // SUCCESS: Found a barcode!
                document.getElementById('serial').value = decodedText;
                statusDiv.innerHTML = "<span style='color: #4CAF50;'>✓ Barcode Scanned!</span>";
                stopScanner();
            }
        );
        startButton.innerHTML = "Stop Scanner";
        startButton.style.backgroundColor = "#ff5252";
        startButton.onclick = stopScanner;
        startButton.disabled = false;
    } catch (err) {
        statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: Camera permission denied.</span>";
        startButton.disabled = false;
    }
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('startScan').innerHTML = "Open Camera Scanner";
            document.getElementById('startScan').style.backgroundColor = "#2196F3";
            document.getElementById('startScan').onclick = startScanner;
        });
    }
}

// Ensure the button is wired up on page load
document.getElementById('startScan').onclick = startScanner;

async function submitScan() {
    const serial = document.getElementById('serial').value;
    const deviceType = document.getElementById('deviceType').value;
    const statusDiv = document.getElementById('statusMessage');

    if(!serial) {
        statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: Serial Number required.</span>";
        return;
    }

    statusDiv.innerHTML = "<span style='color: #ffa500;'>Transmitting to AWS...</span>";

    const apiUrl = "https://ii97ncprab.execute-api.us-east-1.amazonaws.com/scan";

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ SerialNumber: serial, DeviceType: deviceType })
        });

        if(response.ok) {
            statusDiv.innerHTML = "<span style='color: #4CAF50;'>✓ Logged to DynamoDB & ServiceNow!</span>";
            document.getElementById('serial').value = '';
        } else {
            statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: AWS rejected the scan.</span>";
        }
    } catch (error) {
        statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: Could not reach the API.</span>";
    }
}
    </script>
</body>
</html>
