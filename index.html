<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHLMS Tech Portal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background-color: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #4CAF50; margin-bottom: 20px; }
        label { display: block; text-align: left; margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #startScan { background-color: #2196F3; color: white; }
        #submitBtn { background-color: #4CAF50; color: white; }
        #statusMessage { margin-top: 20px; font-weight: bold; min-height: 24px; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AHLMS Tech Portal</h2>
        
        <div id="reader"></div>
        <button id="startScan">Open Camera Scanner</button>

        <label for="serial">Hardware Serial Number</label>
        <input type="text" id="serial" placeholder="Scan or type SN...">

        <label for="deviceType">Device Type</label>
        <select id="deviceType">
            <option value="HP EliteBook">HP EliteBook</option>
            <option value="Dell Latitude">Dell Latitude</option>
            <option value="Cisco Router">Cisco Router</option>
        </select>

        <button id="submitBtn" onclick="submitScan()">Submit to Cloud</button>
        <div id="statusMessage"></div>
    </div>

    <script>
        let html5QrCode;

        async function startScanner() {
            const statusDiv = document.getElementById('statusMessage');
            const startButton = document.getElementById('startScan');
            
            startButton.disabled = true;
            statusDiv.innerHTML = "Initializing camera...";

            // Destroy old instance if it exists
            if(html5QrCode) { await html5QrCode.clear(); }
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { fps: 25, qrbox: { width: 280, height: 120 }, aspectRatio: 1.777778 };

            try {
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    // Manual Override: Pick the last camera (usually the main back lens)
                    const backCameraId = devices[devices.length - 1].id;
                    
                    await html5QrCode.start(
                        backCameraId, 
                        config,
                        (decodedText) => {
                            document.getElementById('serial').value = decodedText;
                            statusDiv.innerHTML = "<span style='color: #4CAF50;'>✓ Barcode Scanned!</span>";
                            stopScanner();
                        }
                    );
                    
                    startButton.innerHTML = "Stop Scanner";
                    startButton.style.backgroundColor = "#ff5252";
                    startButton.onclick = stopScanner;
                    startButton.disabled = false;
                } else {
                    statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: No cameras found.</span>";
                    startButton.disabled = false;
                }
            } catch (err) {
                statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: Camera permission denied.</span>";
                startButton.disabled = false;
            }
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    const startButton = document.getElementById('startScan');
                    startButton.innerHTML = "Open Camera Scanner";
                    startButton.style.backgroundColor = "#2196F3";
                    startButton.onclick = startScanner;
                });
            }
        }

        document.getElementById('startScan').onclick = startScanner;

        async function submitScan() {
            const serial = document.getElementById('serial').value;
            const deviceType = document.getElementById('deviceType').value;
            const statusDiv = document.getElementById('statusMessage');

            if(!serial) {
                statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: Serial Number required.</span>";
                return;
            }

            statusDiv.innerHTML = "<span style='color: #ffa500;'>Transmitting to AWS...</span>";

            const apiUrl = "https://ii97ncprab.execute-api.us-east-1.amazonaws.com/scan";

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ SerialNumber: serial, DeviceType: deviceType })
                });

                if(response.ok) {
                    statusDiv.innerHTML = "<span style='color: #4CAF50;'>✓ Logged to DynamoDB & ServiceNow!</span>";
                    document.getElementById('serial').value = '';
                } else {
                    statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: AWS rejected the scan.</span>";
                }
            } catch (error) {
                statusDiv.innerHTML = "<span style='color: #ff5252;'>Error: Could not reach the API.</span>";
            }
        }
    </script>
</body>
</html>
